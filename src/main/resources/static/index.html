<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ender Tiers | Vanguard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-5xl font-black italic tracking-tighter text-violet-500 uppercase">
            Ender<span class="text-white">Tiers</span>
        </h1>
        
        <div id="ladder" class="mt-12 space-y-3">
            </div>
    </div>

    <div class="fixed bottom-6 right-6 z-50">
        <div class="bg-zinc-900/90 backdrop-blur-md px-4 py-2 rounded-xl border border-violet-500/20 shadow-2xl">
            <p class="text-[10px] tracking-[0.3em] uppercase font-black text-zinc-500">
                Website Made By <span class="text-violet-400">falqz</span>
            </p>
        </div>
    </div>

    <script>
        // This part talks to your Java code in image_8c1b55.png
        fetch('/api/v1/ladder')
            .then(res => res.json())
            .then(data => {
                document.getElementById('ladder').innerHTML = data.map(p => `
                    <div class="p-5 bg-zinc-900/50 rounded-2xl flex justify-between items-center border border-white/5">
                        <span class="text-lg font-bold">${p.username}</span>
                        <div class="flex items-center gap-8">
                            <span class="text-violet-400 font-black px-3 py-1 bg-violet-500/10 rounded-lg">${p.tier}</span>
                            <span class="text-zinc-400 font-mono text-sm">${p.elo} ELO</span>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
